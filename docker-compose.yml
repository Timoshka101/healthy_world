version: '3.9'

services:
  db:
    image: postgres:16.1
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  web:
    build: .
    env_file:
      - .env
    ports:
      - "6060:8000"
    depends_on:
      - db
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn healthy_world.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app

volumes:
  postgres_data:
